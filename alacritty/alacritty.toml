# Importă schema de culori generată de pywal
# Sintaxa corectă pentru versiunile noi de Alacritty
[general]
import = ["~/.cache/wal/alacritty.toml"]

# Setări pentru font
[font]
size = 12.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"
# Elimină complet decorațiunile ferestrei (bara de titlu)
[window]
decorations = "none"
